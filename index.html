    <script>
      (function () {
        var stored = localStorage.getItem('theme')
        var dark = stored ? stored === 'dark' : !window.matchMedia('(prefers-color-scheme: light)').matches
        document.documentElement.classList.toggle('dark', dark)
      })()
    </script>
